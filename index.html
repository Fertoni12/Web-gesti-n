<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gestión Privada Premium</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg-orb orb-a" aria-hidden="true"></div>
  <div class="bg-orb orb-b" aria-hidden="true"></div>
  <div class="noise-layer" aria-hidden="true"></div>

  <main class="app-shell">
    <header class="topbar glass-card">
      <div class="headline">
        <p class="eyebrow">PRIVATE HUB · SECURE VAULT</p>
        <h1>Dashboard Premium</h1>
        <p class="subtitle">Experiencia tipo banca digital: datos críticos, accesos y cuentas en un solo lugar.</p>
      </div>

      <label class="search-wrap" for="searchInput">
        <span>Buscar en tiempo real</span>
        <input id="searchInput" type="search" placeholder="DUI, NIT, correo, banco, plataforma..." autocomplete="off" />
      </label>
    </header>

    <section class="widgets" id="widgetsSection" aria-label="Datos importantes"></section>

    <section class="dashboard" id="dashboard" aria-label="Categorías"></section>

    <p class="empty-state hidden" id="emptyState">No encontramos resultados con ese criterio.</p>
  </main>

  <aside id="toast" class="toast" role="status" aria-live="polite" aria-atomic="true"></aside>

  <template id="widgetTemplate">
    <article class="widget glass-card">
      <div class="widget-main">
        <div class="icon-dot" aria-hidden="true"></div>
        <div>
          <p class="widget-label"></p>
          <h2 class="widget-value"></h2>
        </div>
      </div>
      <button class="copy-btn" type="button">Copiar</button>
    </article>
  </template>

  <template id="categoryTemplate">
    <article class="category glass-card">
      <header class="category-header">
        <div class="category-title-wrap">
          <span class="category-icon" aria-hidden="true"></span>
          <h3></h3>
        </div>
        <p class="category-count"></p>
      </header>
      <div class="category-list"></div>
    </article>
  </template>

  <template id="itemTemplate">
    <div class="entry">
      <div class="entry-main">
        <span class="entry-icon" aria-hidden="true"></span>
        <div>
          <p class="entry-title"></p>
          <p class="entry-value"></p>
        </div>
      </div>
      <button class="copy-btn" type="button">Copiar</button>
    </div>
  </template>

  <script src="app.js"></script>
</body>
</html>
